<head>
  <meta charset="utf-8">
  <title>Documents repository</title>
  <style>
* { box-sizing: border-box; }
html, body {
  height: 100%;
  margin: 0;
}
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f5f7;
  color: #222;
  line-height: 1.5;
  font-size: 14px;
}

.container {
  width: 100%;
  height: 100%;
  padding: 24px 32px;
  background: #fff;
  box-shadow: none;
  border-radius: 0;
}

h1 {
  margin-top: 0;
  margin-bottom: 0.5em;
}
h2 {
  margin-top: 0;
  border-bottom: 1px solid #eee;
  padding-bottom: 0.25em;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #555;
}
ul {
  list-style-type: disc;
  padding-left: 1.5rem;
  margin: 0.5em 0 0;
}
li {
  margin: 0.25em 0;
}
a {
  color: #0066cc;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

.columns {
  display: flex;
  gap: 32px;
  height: calc(100% - 3rem);
}
.column {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
}

@media (max-width: 700px) {
  .columns {
    flex-direction: column;
    height: auto;
  }
}
  </style>
</head>
